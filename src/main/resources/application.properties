spring.datasource.url=jdbc:postgresql://localhost:5432/astroscout
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========== AI provider and model config ==========
# Choose one provider: openai | anthropic
astroscout.ai.provider=${ASTROSCOUT_AI_PROVIDER:openai}

# OpenAI-style provider config (used when provider=openai)
spring.ai.openai.api-key=${ASTROSCOUT_OPENAI_API_KEY:}
spring.ai.openai.base-url=${ASTROSCOUT_OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.completions-path=${ASTROSCOUT_OPENAI_COMPLETIONS_PATH:/v1/chat/completions}
spring.ai.openai.chat.options.model=${ASTROSCOUT_OPENAI_MODEL:gpt-4o-mini}

# Anthropic-style provider config (used when provider=anthropic)
spring.ai.anthropic.api-key=${ASTROSCOUT_ANTHROPIC_API_KEY:}
spring.ai.anthropic.base-url=${ASTROSCOUT_ANTHROPIC_BASE_URL:https://api.anthropic.com}
spring.ai.anthropic.chat.options.model=${ASTROSCOUT_ANTHROPIC_MODEL:claude-3-5-sonnet-latest}

# ========== Local upload config ==========
astroscout.upload-dir=${ASTROSCOUT_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB