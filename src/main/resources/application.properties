spring.datasource.url=jdbc:postgresql://localhost:5432/astroscout
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Spring AI: choose provider with astroscout.ai.provider=openai|anthropic.
# OpenAI-style: spring.ai.openai.* (e.g. MiniMax api.minimax.io). Anthropic-style: spring.ai.anthropic.* (e.g. MiniMax api.minimaxi.com/anthropic).
# For local secrets use application-local.properties and run with -Dspring-boot.run.profiles=local