# Local overrides for AI provider testing
# Do not commit real keys here.

# ===== Option A: OpenAI-style =====
# astroscout.ai.provider=openai
# spring.ai.openai.api-key=<your_openai_or_openai_compatible_key>
# spring.ai.openai.base-url=https://api.openai.com
# spring.ai.openai.chat.completions-path=/v1/chat/completions
# spring.ai.openai.chat.options.model=gpt-4o-mini

# Example for MiniMax OpenAI-compatible API:
# astroscout.ai.provider=openai
# spring.ai.openai.api-key=<your_minimax_key>
# spring.ai.openai.base-url=https://api.minimax.io
# spring.ai.openai.chat.completions-path=/v1/text/chatcompletion_v2
# spring.ai.openai.chat.options.model=MiniMax-M2.5

# ===== Option B: Anthropic-style =====
# astroscout.ai.provider=anthropic
# spring.ai.anthropic.api-key=<your_anthropic_or_compatible_key>
# spring.ai.anthropic.base-url=https://api.anthropic.com
# spring.ai.anthropic.chat.options.model=claude-3-5-sonnet-latest

# Example for MiniMax Anthropic-compatible API:
# astroscout.ai.provider=anthropic
# spring.ai.anthropic.api-key=<your_minimax_key>
# spring.ai.anthropic.base-url=https://api.minimaxi.com/anthropic
# spring.ai.anthropic.chat.options.model=MiniMax-M2.5
